{% extends "_layout.html" %}{% block content %}
<div class="rounded-2xl border border-slate-200 dark:border-slate-800/70 bg-white dark:bg-slate-900/45 dark:backdrop-blur p-5 shadow-sm">
  <div class="text-2xl font-semibold">Редактирование группировки</div>
  <div class="text-slate-600 dark:text-slate-400 text-sm mt-1">{{ group['name'] }} (ID #{{ group['id'] }})</div>
</div>

<form class="mt-4 rounded-2xl border border-slate-200 dark:border-slate-800/70 bg-white dark:bg-slate-900/45 dark:backdrop-blur p-5 shadow-sm" method="post" action="{{ route_base|default('/admin') }}/groups/edit">
  <input type="hidden" name="group_id" value="{{ group['id'] }}"/>
  <div class="flex items-center justify-between gap-3 flex-wrap">
    <div class="text-sm text-slate-700 dark:text-slate-300">Выбери чаты, которые входят в группировку</div>
    <div class="flex gap-2">
      <button type="button" id="toggleAll" class="text-xs px-3 py-2 rounded-xl bg-white/70 dark:bg-slate-950/20 border border-slate-200 dark:border-slate-800/70 hover:border-slate-300 dark:hover:border-slate-700">Выбрать все</button>
      <a href="{{ route_base|default('/admin') }}/groups" class="text-xs px-3 py-2 rounded-xl bg-white/70 dark:bg-slate-950/20 border border-slate-200 dark:border-slate-800/70 hover:border-slate-300 dark:hover:border-slate-700">Назад</a>
    </div>
  </div>

  <div class="mt-3">
    <input id="groupChatSearch" type="text" placeholder="Поиск чатов в группировке… (по названию или ID)" class="w-full px-3 py-2 rounded-xl bg-white/80 dark:bg-slate-950/20 border border-slate-200/70 dark:border-slate-800/70 outline-none focus:border-slate-300 dark:focus:border-slate-700 text-sm"/>
  </div>
  <div id="groupChatList" class="mt-3 space-y-2 max-h-[560px] overflow-auto pr-1">
    {% for c in chats %}
    <label class="flex items-center gap-2 p-3 rounded-xl bg-white/70 dark:bg-slate-950/20 border border-slate-200 dark:border-slate-800/70 hover:border-slate-300 dark:hover:border-slate-700 {% if c['blocked']==1 %}opacity-60{% endif %}">
      <input type="checkbox" name="chat_ids" value="{{ c['chat_id'] }}" class="accent-black dark:accent-white" {% if c['chat_id'] in members %}checked{% endif %} {% if c['blocked']==1 %}disabled{% endif %}>
      <div class="min-w-0">
        <div class="font-medium truncate">{{ c['title'] }}</div>
        <div class="text-xs text-slate-500 dark:text-slate-400">ID: {{ c['chat_id'] }} · {{ c['chat_type'] }}{% if c['blocked']==1 %} · заблокирован{% endif %}</div>
      </div>
    </label>
    {% endfor %}
    {% if chats|length == 0 %}<div class="text-slate-600 dark:text-slate-400 text-sm">Чатов пока нет. Добавь бота в группы.</div>{% endif %}
  </div>

  <button class="mt-5 px-5 py-3 rounded-xl bg-slate-900 text-white dark:bg-white dark:text-slate-950 font-semibold hover:opacity-90">Сохранить</button>
</form>

<script>
  document.getElementById('toggleAll').addEventListener('click', () => {
    const boxes = document.querySelectorAll('input[name="chat_ids"]');
    const enabled = Array.from(boxes).filter(b => !b.disabled);
    const allChecked = enabled.every(b => b.checked);
    enabled.forEach(b => b.checked = !allChecked);
  });

  // Search/filter chats list
  (function(){
    const input = document.getElementById('groupChatSearch');
    const list = document.getElementById('groupChatList');
    if(!input || !list) return;
    const labels = Array.from(list.querySelectorAll('label'));
    function apply(){
      const q = (input.value||'').trim().toLowerCase();
      let visible = 0;
      labels.forEach(l=>{
        const t = (l.innerText||'').toLowerCase();
        const ok = !q || t.includes(q);
        l.style.display = ok ? '' : 'none';
        if(ok) visible++;
      });
    }
    input.addEventListener('input', apply);
  })();

</script>
{% endblock %}
