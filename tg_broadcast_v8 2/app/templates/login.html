<!doctype html>
<html lang="ru" class="dark">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script>window.tailwind=window.tailwind||{};window.tailwind.config={darkMode:'class'};</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Вход</title>
  <script>
  // theme fixed: dark only
</script>
  <style>
    .bg-soft {
      background:
        radial-gradient(1200px 600px at 10% 0%, rgba(124,58,237,.22), transparent 60%),
        radial-gradient(1000px 500px at 90% 20%, rgba(6,182,212,.18), transparent 55%),
        linear-gradient(to bottom, rgba(2,6,23,1), rgba(10,15,30,1));
    }

      background:
        radial-gradient(1200px 600px at 10% 0%, rgba(124,58,237,.22), transparent 60%),
        radial-gradient(1000px 500px at 90% 20%, rgba(6,182,212,.18), transparent 55%),
        linear-gradient(to bottom, rgba(2,6,23,1), rgba(10,15,30,1));
    }
  </style>
</head>
<body class="min-h-screen bg-soft text-slate-900 dark:text-slate-100 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white dark:bg-slate-900/45 dark:backdrop-blur border border-slate-200 dark:border-slate-800/70 rounded-2xl p-6 shadow-sm">
    <div class="flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="rounded-2xl bg-white dark:bg-white/10 backdrop-blur border border-slate-200 dark:border-slate-800/70 shadow-sm p-2">
          <img src="/static/maxma_logo.svg" alt="maxma" class="h-8 w-auto"/>
        </div>
        <div>
          <div class="text-xl font-semibold leading-tight">Вход в панель</div>
          <div class="text-slate-600 dark:text-slate-400 text-sm">Информирование брендов</div>
        </div>
      </div>
</div>
    {% if error %}<div class="mt-4 p-3 rounded-xl bg-red-500/12 border border-red-500/25 text-red-700 dark:text-red-200">{{ error }}</div>{% endif %}
    <form class="mt-5 space-y-3" method="post" action="/admin/login">
      <input name="login" placeholder="Логин" class="w-full px-4 py-3 rounded-xl bg-white/70 dark:bg-slate-950/30 border border-slate-200 dark:border-slate-800/70 outline-none focus:border-slate-400 dark:focus:border-slate-600"/>
      <input name="password" type="password" placeholder="Пароль" class="w-full px-4 py-3 rounded-xl bg-white/70 dark:bg-slate-950/30 border border-slate-200 dark:border-slate-800/70 outline-none focus:border-slate-400 dark:focus:border-slate-600"/>
      <button class="w-full px-4 py-3 rounded-xl bg-slate-900 text-white dark:bg-white dark:text-slate-950 font-semibold hover:opacity-90">Войти</button>
    </form>
  </div>
</body>
</html>
